version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: whatnot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: whatnot_sidecar
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - whatnot_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d whatnot_sidecar"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  whatnot_postgres_data:
